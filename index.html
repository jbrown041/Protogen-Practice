<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jenna Brown | Hello Slalomers</title>

  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">

  <!-- Open Graph -->
  <meta property="og:title" content="Jenna Brown | Hello Slalomers" />
  <meta property="og:description" content="Welcome to my page — say hello!" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="_8507492.jpg" />

  <link rel="stylesheet" href="weather.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 20px;
      background: linear-gradient(135deg, #2d0057 0%, #6a0dad 40%, #c084fc 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 1;
    }

    .profile-photo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      margin-bottom: 28px;
    }

    h1 {
      color: #ffffff;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    p.subtitle {
      color: rgba(255, 255, 255, 0.75);
      font-size: 1rem;
      margin-bottom: 32px;
    }

    .contact-btn {
      display: inline-block;
      padding: 14px 36px;
      background: #ffffff;
      color: #6a0dad;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
    }

    @keyframes wiggle {
      0%   { transform: rotate(0deg); }
      15%  { transform: rotate(-6deg); }
      30%  { transform: rotate(6deg); }
      45%  { transform: rotate(-4deg); }
      60%  { transform: rotate(4deg); }
      75%  { transform: rotate(-2deg); }
      90%  { transform: rotate(2deg); }
      100% { transform: rotate(0deg); }
    }

    .contact-btn:hover {
      background: linear-gradient(135deg, #1a73e8, #6dd5fa);
      color: #ffffff;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
      animation: wiggle 0.5s ease;
    }

    .contact-btn:active {
      filter: brightness(0.92);
    }



    /* Stars */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .star {
      position: absolute;
      color: rgba(255, 255, 255, 0.3);
      line-height: 1;
      user-select: none;
    }

    @keyframes floatStar {
      from { transform: translateX(-120px); }
      to   { transform: translateX(110vw); }
    }

    .star:nth-child(1) { font-size: 2rem;   top: 10%;  animation: floatStar 14s linear infinite; }
    .star:nth-child(2) { font-size: 1rem;   top: 25%;  animation: floatStar 20s linear 3s infinite; }
    .star:nth-child(3) { font-size: 3rem;   top: 50%;  animation: floatStar 12s linear 6s infinite; }
    .star:nth-child(4) { font-size: 1.4rem; top: 68%;  animation: floatStar 18s linear 1s infinite; }
    .star:nth-child(5) { font-size: 2.5rem; top: 80%;  animation: floatStar 16s linear 9s infinite; }
    .star:nth-child(6) { font-size: 1.8rem; top: 38%;  animation: floatStar 22s linear 4s infinite; }
    .star:nth-child(7) { font-size: 1.2rem; top: 58%;  animation: floatStar 15s linear 11s infinite; }
    .star:nth-child(8) { font-size: 2.2rem; top: 18%;  animation: floatStar 19s linear 7s infinite; }

    /* Clock */
    .clock {
      position: relative;
      z-index: 1;
      color: rgba(255, 255, 255, 0.85);
      font-size: 1rem;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      letter-spacing: 1.5px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      padding: 8px 22px;
      backdrop-filter: blur(8px);
      text-shadow: 0 0 12px rgba(200, 150, 255, 0.5);
    }
  </style>
</head>
<body>
  <div id="clock" class="clock"></div>
  <div class="stars">
    <div class="star">★</div>
    <div class="star">✦</div>
    <div class="star">★</div>
    <div class="star">✧</div>
    <div class="star">★</div>
    <div class="star">✦</div>
    <div class="star">✧</div>
    <div class="star">★</div>
  </div>
  <div class="card">
    <img
      class="profile-photo"
      src="_8507492.jpg"
      alt="Photo of me"
      onerror="this.src='https://placehold.co/140x140/c084fc/ffffff?text=Me'"
    />
    <h1>Hello Slalomers!</h1>
    <p class="subtitle">Welcome to my page.</p>
    <button class="contact-btn">Contact Me</button>
  </div>

  <!-- Weather Widget Container -->
  <div id="weather-widget" class="weather-widget">
    <div class="weather-header">
      <h3>Current Weather</h3>
      <button id="refresh-weather" class="refresh-btn">↻</button>
    </div>
    <div id="weather-content" class="weather-content">
      <div class="weather-loading">
        <div class="loading-spinner"></div>
        <p>Loading weather data...</p>
      </div>
    </div>
    <div id="location-fallback" class="location-fallback" style="display: none;">
      <p>Unable to detect location</p>
      <input type="text" id="city-input" placeholder="Enter city name">
      <button id="search-weather">Get Weather</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script>
    class WeatherWidget {
      constructor() {
        this.apiBase = 'https://api.open-meteo.com/v1';
        this.geocodingApi = 'https://geocoding-api.open-meteo.com/v1';
        this.init();
      }

      init() {
        this.bindEvents();
        this.loadWeather();
      }

      bindEvents() {
        document.getElementById('refresh-weather').addEventListener('click', () => {
          this.loadWeather();
        });
        document.getElementById('search-weather').addEventListener('click', () => {
          this.searchByCity();
        });
        document.getElementById('city-input').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') this.searchByCity();
        });
      }

      async loadWeather() {
        this.showLoading();
        try {
          const position = await this.getCurrentPosition();
          const weatherData = await this.fetchWeatherData(
            position.coords.latitude,
            position.coords.longitude
          );
          this.displayWeather(weatherData);
        } catch (error) {
          console.error('Weather loading error:', error);
          this.showLocationFallback();
        }
      }

      getCurrentPosition() {
        return new Promise((resolve, reject) => {
          if (!navigator.geolocation) {
            reject(new Error('Geolocation not supported'));
            return;
          }
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            timeout: 10000,
            enableHighAccuracy: true
          });
        });
      }

      async fetchWeatherData(lat, lon) {
        const params = new URLSearchParams({
          latitude: lat,
          longitude: lon,
          current_weather: true,
          hourly: 'relativehumidity_2m',
          timezone: 'auto',
          temperature_unit: 'fahrenheit',
          windspeed_unit: 'mph'
        });
        const response = await fetch(`${this.apiBase}/forecast?${params}`);
        if (!response.ok) throw new Error(`Weather API error: ${response.status}`);
        return response.json();
      }

      async searchByCity() {
        const cityName = document.getElementById('city-input').value.trim();
        if (!cityName) return;
        this.showLoading();
        try {
          const geoResponse = await fetch(
            `${this.geocodingApi}/search?name=${encodeURIComponent(cityName)}&count=1`
          );
          const geoData = await geoResponse.json();
          if (!geoData.results || geoData.results.length === 0) throw new Error('City not found');
          const { latitude, longitude } = geoData.results[0];
          const weatherData = await this.fetchWeatherData(latitude, longitude);
          this.displayWeather(weatherData, cityName);
          document.getElementById('location-fallback').style.display = 'none';
        } catch (error) {
          this.showError('Unable to find weather for that city');
        }
      }

      displayWeather(data, locationName = 'Your Location') {
        const weather = data.current_weather;
        const humidity = data.hourly?.relativehumidity_2m?.[0] ?? 'N/A';
        const weatherHTML = `
          <div class="weather-info">
            <div class="weather-main">
              <div class="weather-icon">${this.getWeatherIcon(weather.weathercode)}</div>
              <div class="temperature">${Math.round(weather.temperature)}°F</div>
              <div class="weather-description">${this.getWeatherDescription(weather.weathercode)}</div>
              <div class="location">${locationName}</div>
            </div>
            <div class="weather-details">
              <div><span>Wind:</span> <span>${weather.windspeed} mph</span></div>
              <div><span>Direction:</span> <span>${this.getWindDirection(weather.winddirection)}</span></div>
              <div><span>Humidity:</span> <span>${humidity}%</span></div>
              <div><span>Updated:</span> <span>${this.formatTime(weather.time)}</span></div>
            </div>
          </div>`;
        document.getElementById('weather-content').innerHTML = weatherHTML;
      }

      showLoading() {
        document.getElementById('weather-content').innerHTML = `
          <div class="weather-loading">
            <div class="loading-spinner"></div>
            <p>Loading weather data...</p>
          </div>`;
        document.getElementById('location-fallback').style.display = 'none';
      }

      showLocationFallback() {
        document.getElementById('weather-content').innerHTML = `
          <div class="error-message"><p>Unable to detect your location automatically</p></div>`;
        document.getElementById('location-fallback').style.display = 'block';
      }

      showError(message) {
        document.getElementById('weather-content').innerHTML = `
          <div class="error-message"><p>${message}</p></div>`;
      }

      getWeatherDescription(code) {
        const descriptions = {
          0: 'Clear sky', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
          45: 'Foggy', 48: 'Depositing rime fog',
          51: 'Light drizzle', 53: 'Moderate drizzle', 55: 'Dense drizzle',
          61: 'Slight rain', 63: 'Moderate rain', 65: 'Heavy rain',
          71: 'Slight snow', 73: 'Moderate snow', 75: 'Heavy snow',
          95: 'Thunderstorm', 96: 'Thunderstorm with hail', 99: 'Thunderstorm with heavy hail'
        };
        return descriptions[code] || 'Unknown';
      }

      getWeatherIcon(code) {
        const icons = {
          0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
          45: '🌫️', 48: '🌫️',
          51: '🌦️', 53: '🌦️', 55: '🌦️',
          61: '🌧️', 63: '🌧️', 65: '⛈️',
          71: '🌨️', 73: '❄️', 75: '❄️',
          95: '⛈️', 96: '⛈️', 99: '⛈️'
        };
        return icons[code] || '🌡️';
      }

      getWindDirection(degrees) {
        const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
        return directions[Math.round(degrees / 45) % 8];
      }

      formatTime(timeString) {
        return new Date(timeString).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }
    }

    document.addEventListener('DOMContentLoaded', () => { new WeatherWidget(); });

    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', {
        timeZone: 'America/New_York',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
      });
      const dateStr = now.toLocaleDateString('en-US', {
        timeZone: 'America/New_York',
        weekday: 'short',
        month: 'short',
        day: 'numeric'
      });
      const currentMinute = now.toLocaleString('en-US', { timeZone: 'America/New_York', minute: '2-digit' });
      if (updateClock._lastMinute !== undefined && updateClock._lastMinute !== currentMinute) {
        const clockEl = document.getElementById('clock');
        const rect = clockEl.getBoundingClientRect();
        const x = (rect.left + rect.width / 2) / window.innerWidth;
        const y = (rect.top + rect.height / 2) / window.innerHeight;
        confetti({ particleCount: 80, spread: 90, origin: { x, y }, colors: ['#b388ff', '#ffffff', '#c084fc', '#6dd5fa', '#ffd6ff'] });
      }
      updateClock._lastMinute = currentMinute;
      document.getElementById('clock').textContent = `${dateStr}  •  ${timeStr} ET`;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
