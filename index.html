<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homepage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2d0057 0%, #6a0dad 40%, #c084fc 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
    }

    .profile-photo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      margin-bottom: 28px;
    }

    h1 {
      color: #ffffff;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    p.subtitle {
      color: rgba(255, 255, 255, 0.75);
      font-size: 1rem;
      margin-bottom: 32px;
    }

    .contact-btn {
      display: inline-block;
      padding: 14px 36px;
      background: #ffffff;
      color: #6a0dad;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .contact-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
    }

    .contact-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Replace 'photo.jpg' with the path to your actual photo -->
    <img
      class="profile-photo"
      src="photo.jpg"
      alt="Photo of me"
      onerror="this.src='https://placehold.co/140x140/c084fc/ffffff?text=Me'"
    />
    <h1>Hello Slalomers!</h1>
    <p class="subtitle">Welcome to my page.</p>
    <button class="contact-btn">Contact Me</button>
  </div>
</body>
</html>
